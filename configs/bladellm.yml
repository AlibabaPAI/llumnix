SERVER:
  RAY_CLUSTER_PORT: 6379
  LAUNCH_RAY_CLUSTER: False
  REQUEST_OUTPUT_QUEUE_TYPE: "rayqueue"
  
MANAGER:
  ENABLE_MIGRATION: True
  MIGRATE_OUT_THRESHOLD: -0.50
  DISPATCH_POLICY: 'flood'
  PAIR_MIGRATION_POLICY: 'defrag_constrained'
  ENABLE_SCALING: False

  LOG_INSTANCE_INFO: False

INSTANCE:
  DISPATCH_LOAD_METRIC: 'usage_ratio'
  GRPC_MIGRATION_BACKEND_SERVER_PORT: 60052

  ENABLE_DEFRAG: True
  REQUEST_MIGRATION_POLICY: 'SR'

  MIGRATION_BACKEND: 'grpc'
  MIGRATION_BUFFER_BLOCKS: 512
